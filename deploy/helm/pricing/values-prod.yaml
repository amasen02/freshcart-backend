replicaCount: 3

image:
  pullPolicy: IfNotPresent

ingress:
  hosts:
    - host: pricing.freshcart.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: pricing-tls-prod
      hosts: [pricing.freshcart.com]

resources:
  requests: { cpu: '250m', memory: '512Mi' }
  limits:   { cpu: '1000m', memory: '1Gi' }

autoscaling:
  minReplicas: 3
  maxReplicas: 15
  targetCPUUtilizationPercentage: 60

podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Pricing has no network secrets (its datastore is the embedded SQLite file), so
# the Key Vault CSI driver stays off in every environment.
keyVault:
  enabled: false

serviceMonitor:
  enabled: true

# Force at-most-one-pod-per-node on prod for resilience.
affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - topologyKey: kubernetes.io/hostname
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: pricing
