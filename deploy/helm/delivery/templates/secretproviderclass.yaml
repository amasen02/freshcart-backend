{{- if .Values.keyVault.enabled }}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "delivery.fullname" . }}-spc
  labels: {{- include "delivery.labels" . | nindent 4 }}
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.serviceAccount.azureWorkloadIdentityClientId | quote }}
    keyvaultName: {{ .Values.keyVault.name | quote }}
    cloudName: ""
    tenantId: {{ .Values.keyVault.tenantId | quote }}
    objects: |
      array:
        {{- range .Values.keyVault.secrets }}
        - |
          objectName: {{ . | quote }}
          objectType: secret
        {{- end }}
  secretObjects:
    - secretName: {{ include "delivery.fullname" . }}-keyvault
      type: Opaque
      data:
        {{- range .Values.keyVault.secrets }}
        - objectName: {{ . | quote }}
          key: {{ . | quote }}
        {{- end }}
{{- end }}
