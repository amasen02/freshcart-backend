{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "customersupport.fullname" . }}
  labels: {{- include "customersupport.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "customersupport.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        {{- toYaml .Values.networkPolicy.ingressFrom | nindent 8 }}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        {{- range .Values.networkPolicy.egressTo }}
        {{- if .cidr }}
        - ipBlock:
            cidr: {{ .cidr | quote }}
        {{- end }}
        {{- end }}
    - to:
        - namespaceSelector:
            matchLabels: { name: kube-system }
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
{{- end }}
