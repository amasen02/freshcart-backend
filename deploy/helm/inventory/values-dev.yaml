replicaCount: 1

image:
  pullPolicy: Always

ingress:
  hosts:
    - host: inventory.dev.freshcart.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: inventory-tls-dev
      hosts: [inventory.dev.freshcart.local]

resources:
  requests: { cpu: '50m', memory: '128Mi' }
  limits:   { cpu: '300m', memory: '384Mi' }

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

config:
  ASPNETCORE_ENVIRONMENT: Development

secrets:
  literal:
    ConnectionStrings__inventorydb: 'Server=tcp:freshcart-dev-sql.database.windows.net,1433;Database=FreshCart.Inventory;Authentication=Active Directory Workload Identity;Encrypt=True'

serviceMonitor:
  enabled: true
