replicaCount: 1

image:
  pullPolicy: Always

ingress:
  hosts:
    - host: notification.dev.freshcart.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: notification-tls-dev
      hosts: [notification.dev.freshcart.local]

resources:
  requests: { cpu: '50m', memory: '128Mi' }
  limits:   { cpu: '300m', memory: '384Mi' }

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

config:
  ASPNETCORE_ENVIRONMENT: Development

secrets:
  literal:
    ConnectionStrings__notificationsdb: 'mongodb://freshcart-dev-cosmos.mongo.cosmos.azure.com:10255/freshcart_notifications?ssl=true&retrywrites=false'
    ConnectionStrings__cache: 'freshcart-dev-redis.redis.cache.windows.net:6380,ssl=True,abortConnect=False'

serviceMonitor:
  enabled: true
