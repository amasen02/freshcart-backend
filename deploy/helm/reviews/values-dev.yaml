replicaCount: 1

image:
  pullPolicy: Always

ingress:
  hosts:
    - host: reviews.dev.freshcart.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: reviews-tls-dev
      hosts: [reviews.dev.freshcart.local]

resources:
  requests: { cpu: '50m', memory: '128Mi' }
  limits:   { cpu: '300m', memory: '384Mi' }

autoscaling:
  enabled: false

podDisruptionBudget:
  enabled: false

config:
  ASPNETCORE_ENVIRONMENT: Development

secrets:
  literal:
    ConnectionStrings__reviewsdb: 'mongodb://freshcart-dev-cosmos.mongo.cosmos.azure.com:10255/freshcart_reviews?ssl=true&retrywrites=false'

serviceMonitor:
  enabled: true
