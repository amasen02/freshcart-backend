apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: catalog-spc
  namespace: freshcart
spec:
  provider: azure
  parameters:
    usePodIdentity: 'false'
    useVMManagedIdentity: 'false'
    clientID: '00000000-0000-0000-0000-000000000000'
    keyvaultName: 'freshcart-prod-kv'
    cloudName: ''
    tenantId: '00000000-0000-0000-0000-000000000000'
    objects: |
      array:
        - |
          objectName: catalogdb-connection-string
          objectType: secret
        - |
          objectName: cache-connection-string
          objectType: secret
  secretObjects:
    - secretName: catalog-keyvault
      type: Opaque
      data:
        - { objectName: catalogdb-connection-string, key: ConnectionStrings__catalogdb }
        - { objectName: cache-connection-string, key: ConnectionStrings__cache }
