# ---------------------------------------------------------------------------
# Per-service CI/CD for the Identity bounded context.
# Mirrors azure-pipelines/identity-pipeline.yaml — the repo runs on either
# platform with identical gates.
# ---------------------------------------------------------------------------
name: identity-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/Services/Identity/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/identity-ci.yml'
      - '.github/workflows/reusable-*.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/Services/Identity/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: identity-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test · Quality
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: identity
      projectPath: src/Services/Identity/FreshCart.Identity.Api/FreshCart.Identity.Api.csproj
      testProjectPath: src/Services/Identity/FreshCart.Identity.Tests/FreshCart.Identity.Tests.csproj
      sonarProjectKey: FreshCart_Identity
      sonarOrganization: freshcart
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container:
    name: Container · Scan · Sign · Push
    needs: build-test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/reusable-container.yml
    with:
      serviceName: identity
      dockerfilePath: src/Services/Identity/FreshCart.Identity.Api/Dockerfile
      imageRepository: ${{ github.repository_owner }}/freshcart-identity
      acrName: freshcartacr
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-dev:
    name: Deploy → DEV
    needs: container
    if: github.ref == 'refs/heads/main'
    environment:
      name: freshcart-dev
      url: https://identity-dev.freshcart.local
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: identity
      chartPath: deploy/helm/identity
      valuesFile: deploy/helm/identity/values-dev.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-dev
      aksClusterName: freshcart-dev-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-staging:
    name: Deploy → STAGING (1 approver)
    needs: deploy-dev
    environment:
      name: freshcart-staging
      url: https://identity-staging.freshcart.local
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: identity
      chartPath: deploy/helm/identity
      valuesFile: deploy/helm/identity/values-staging.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-staging
      aksClusterName: freshcart-staging-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-prod:
    name: Deploy → PROD (blue/green, 2 approvers)
    needs: deploy-staging
    environment:
      name: freshcart-prod
      url: https://identity.freshcart.com
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: identity
      chartPath: deploy/helm/identity
      valuesFile: deploy/helm/identity/values-prod.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-prod
      aksClusterName: freshcart-prod-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
