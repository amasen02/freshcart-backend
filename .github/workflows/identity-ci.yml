# ---------------------------------------------------------------------------
# CI for the identity service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: identity-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Identity/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/identity-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Identity/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: identity-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: identity
      testProjectPath: src/Services/Identity/FreshCart.Identity.Tests/FreshCart.Identity.Tests.csproj
