# ---------------------------------------------------------------------------
# CI for the delivery service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: delivery-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Delivery/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/delivery-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Delivery/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: delivery-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: delivery
      testProjectPath: src/Services/Delivery/FreshCart.Delivery.Tests/FreshCart.Delivery.Tests.csproj
