# ---------------------------------------------------------------------------
# CI for the inventory service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: inventory-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Inventory/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/inventory-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Inventory/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: inventory-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: inventory
      testProjectPath: src/Services/Inventory/FreshCart.Inventory.Tests/FreshCart.Inventory.Tests.csproj
