# ---------------------------------------------------------------------------
# CI for the reviews service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: reviews-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Reviews/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/reviews-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Reviews/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: reviews-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: reviews
      testProjectPath: src/Services/Reviews/FreshCart.Reviews.Tests/FreshCart.Reviews.Tests.csproj
