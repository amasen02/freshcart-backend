# ---------------------------------------------------------------------------
# CI for the payment service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: payment-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Payment/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/payment-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Payment/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: payment-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: payment
      testProjectPath: src/Services/Payment/FreshCart.Payment.Tests/FreshCart.Payment.Tests.csproj
