# ---------------------------------------------------------------------------
# CI for the basket service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: basket-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Basket/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/basket-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Basket/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: basket-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: basket
      testProjectPath: src/Services/Basket/FreshCart.Basket.Tests/FreshCart.Basket.Tests.csproj
