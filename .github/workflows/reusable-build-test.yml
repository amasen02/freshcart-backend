# ---------------------------------------------------------------------------
# Reusable CI for a single service: restore, build (Release), run the test
# project, and list vulnerable packages. Invoked by every per-service workflow
# via `workflow_call`. Building the test project transitively builds the API,
# so only the test project path is needed.
# ---------------------------------------------------------------------------
name: reusable-build-test

on:
  workflow_call:
    inputs:
      serviceName:
        description: 'Short service name, used for log/step labels.'
        required: true
        type: string
      testProjectPath:
        description: 'Relative path to the service test csproj.'
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-test:
    name: Build · Test (${{ inputs.serviceName }})
    runs-on: ubuntu-latest
    env:
      DOTNET_NOLOGO: 'true'
      DOTNET_CLI_TELEMETRY_OPTOUT: 'true'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 'true'

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install .NET SDK (from global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore "${{ inputs.testProjectPath }}"

      - name: Build (Release)
        run: dotnet build "${{ inputs.testProjectPath }}" --configuration Release --no-restore

      - name: Test (Release)
        run: dotnet test "${{ inputs.testProjectPath }}" --configuration Release --no-build --logger "GitHubActions"

      - name: Vulnerable package scan (informational)
        run: dotnet list "${{ inputs.testProjectPath }}" package --vulnerable --include-transitive || true
