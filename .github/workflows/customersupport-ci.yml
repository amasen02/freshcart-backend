# ---------------------------------------------------------------------------
# CI for the customersupport service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: customersupport-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/CustomerSupport/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/customersupport-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/CustomerSupport/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: customersupport-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: customersupport
      testProjectPath: src/Services/CustomerSupport/FreshCart.CustomerSupport.Tests/FreshCart.CustomerSupport.Tests.csproj
