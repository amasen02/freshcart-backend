# ---------------------------------------------------------------------------
# Per-service CI/CD for the CustomerSupport bounded context.
# Same job graph as identity-ci.yml: build-test → container → deploy-dev →
# deploy-staging → deploy-prod, parameterised for CustomerSupport.
# ---------------------------------------------------------------------------
name: customersupport-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/Services/CustomerSupport/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/customersupport-ci.yml'
      - '.github/workflows/reusable-*.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/Services/CustomerSupport/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: customersupport-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test · Quality
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: customersupport
      projectPath: src/Services/CustomerSupport/FreshCart.CustomerSupport.Api/FreshCart.CustomerSupport.Api.csproj
      testProjectPath: src/Services/CustomerSupport/FreshCart.CustomerSupport.Tests/FreshCart.CustomerSupport.Tests.csproj
      sonarProjectKey: FreshCart_CustomerSupport
      sonarOrganization: freshcart
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container:
    name: Container · Scan · Sign · Push
    needs: build-test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/reusable-container.yml
    with:
      serviceName: customersupport
      dockerfilePath: src/Services/CustomerSupport/FreshCart.CustomerSupport.Api/Dockerfile
      imageRepository: ${{ github.repository_owner }}/freshcart-customersupport
      acrName: freshcartacr
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-dev:
    name: Deploy → DEV
    needs: container
    if: github.ref == 'refs/heads/main'
    environment:
      name: freshcart-dev
      url: https://customersupport-dev.freshcart.local
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: customersupport
      chartPath: deploy/helm/customersupport
      valuesFile: deploy/helm/customersupport/values-dev.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-dev
      aksClusterName: freshcart-dev-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-staging:
    name: Deploy → STAGING (1 approver)
    needs: deploy-dev
    environment:
      name: freshcart-staging
      url: https://customersupport-staging.freshcart.local
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: customersupport
      chartPath: deploy/helm/customersupport
      valuesFile: deploy/helm/customersupport/values-staging.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-staging
      aksClusterName: freshcart-staging-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-prod:
    name: Deploy → PROD (blue/green, 2 approvers)
    needs: deploy-staging
    environment:
      name: freshcart-prod
      url: https://customersupport.freshcart.com
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: customersupport
      chartPath: deploy/helm/customersupport
      valuesFile: deploy/helm/customersupport/values-prod.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-prod
      aksClusterName: freshcart-prod-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
