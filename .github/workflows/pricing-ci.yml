# ---------------------------------------------------------------------------
# Per-service CI/CD for the Pricing bounded context.
# Same job graph as identity-ci.yml: build-test → container → deploy-dev →
# deploy-staging → deploy-prod, parameterised for Pricing.
# ---------------------------------------------------------------------------
name: pricing-ci

on:
  push:
    branches: [main]
    paths:
      - 'src/Services/Pricing/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/pricing-ci.yml'
      - '.github/workflows/reusable-*.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [main]
    paths:
      - 'src/Services/Pricing/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: pricing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test · Quality
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: pricing
      projectPath: src/Services/Pricing/FreshCart.Pricing.Grpc/FreshCart.Pricing.Grpc.csproj
      testProjectPath: src/Services/Pricing/FreshCart.Pricing.Tests/FreshCart.Pricing.Tests.csproj
      sonarProjectKey: FreshCart_Pricing
      sonarOrganization: freshcart
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  container:
    name: Container · Scan · Sign · Push
    needs: build-test
    if: github.event_name != 'pull_request'
    uses: ./.github/workflows/reusable-container.yml
    with:
      serviceName: pricing
      dockerfilePath: src/Services/Pricing/FreshCart.Pricing.Grpc/Dockerfile
      imageRepository: ${{ github.repository_owner }}/freshcart-pricing
      acrName: freshcartacr
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-dev:
    name: Deploy → DEV
    needs: container
    if: github.ref == 'refs/heads/main'
    environment:
      name: freshcart-dev
      url: https://pricing-dev.freshcart.local
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: pricing
      chartPath: deploy/helm/pricing
      valuesFile: deploy/helm/pricing/values-dev.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-dev
      aksClusterName: freshcart-dev-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-staging:
    name: Deploy → STAGING (1 approver)
    needs: deploy-dev
    environment:
      name: freshcart-staging
      url: https://pricing-staging.freshcart.local
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: pricing
      chartPath: deploy/helm/pricing
      valuesFile: deploy/helm/pricing/values-staging.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-staging
      aksClusterName: freshcart-staging-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

  deploy-prod:
    name: Deploy → PROD (blue/green, 2 approvers)
    needs: deploy-staging
    environment:
      name: freshcart-prod
      url: https://pricing.freshcart.com
    uses: ./.github/workflows/reusable-helm-deploy.yml
    with:
      serviceName: pricing
      chartPath: deploy/helm/pricing
      valuesFile: deploy/helm/pricing/values-prod.yaml
      imageTag: ${{ github.sha }}
      resourceGroup: freshcart-prod
      aksClusterName: freshcart-prod-aks
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
