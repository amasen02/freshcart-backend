# ---------------------------------------------------------------------------
# CI for the pricing service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: pricing-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Pricing/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/pricing-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Pricing/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: pricing-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: pricing
      testProjectPath: src/Services/Pricing/FreshCart.Pricing.Tests/FreshCart.Pricing.Tests.csproj
