# ---------------------------------------------------------------------------
# CI for the ordering service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: ordering-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Ordering/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/ordering-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Ordering/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: ordering-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: ordering
      testProjectPath: src/Services/Ordering/FreshCart.Ordering.Tests/FreshCart.Ordering.Tests.csproj
