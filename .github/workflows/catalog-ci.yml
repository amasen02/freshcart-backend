# ---------------------------------------------------------------------------
# CI for the catalog service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: catalog-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Catalog/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/catalog-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Catalog/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: catalog-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: catalog
      testProjectPath: src/Services/Catalog/FreshCart.Catalog.Tests/FreshCart.Catalog.Tests.csproj
