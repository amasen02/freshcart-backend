# ---------------------------------------------------------------------------
# CI for the gateway service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: gateway-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/ApiGateways/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/gateway-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/ApiGateways/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: gateway-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: gateway
      testProjectPath: src/ApiGateways/FreshCart.Gateway.Tests/FreshCart.Gateway.Tests.csproj
