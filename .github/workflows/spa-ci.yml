# ---------------------------------------------------------------------------
# CI for the FreshCart customer SPA (Angular 20).
# Lints, runs unit tests headless, builds the production bundle and uploads it.
# On main the bundle is packaged into a hardened nginx image and pushed.
# ---------------------------------------------------------------------------
name: spa-ci

on:
  push:
    branches: [main]
    paths:
      - 'clients/freshcart-customer/**'
      - '.github/workflows/spa-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'clients/freshcart-customer/**'
  workflow_dispatch:

concurrency:
  group: spa-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: clients/freshcart-customer

jobs:
  build-test:
    name: Lint · Test · Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: clients/freshcart-customer/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests (ChromeHeadless)
        run: npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

      - name: Build (production)
        run: npm run build -- --configuration production

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: freshcart-customer-dist
          path: clients/freshcart-customer/dist/freshcart-customer/browser
          if-no-files-found: error

  container:
    name: Container · Scan · Push
    needs: build-test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: echo "shortSha=$(echo "${{ github.sha }}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: clients/freshcart-customer
          file: clients/freshcart-customer/Dockerfile
          load: true
          tags: ghcr.io/${{ github.repository_owner }}/freshcart-customer:${{ steps.tags.outputs.shortSha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ github.repository_owner }}/freshcart-customer:${{ steps.tags.outputs.shortSha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-spa'

      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: clients/freshcart-customer
          file: clients/freshcart-customer/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/freshcart-customer:${{ steps.tags.outputs.shortSha }}
            ghcr.io/${{ github.repository_owner }}/freshcart-customer:run-${{ github.run_number }}
            ghcr.io/${{ github.repository_owner }}/freshcart-customer:latest
