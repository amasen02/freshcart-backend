# ---------------------------------------------------------------------------
# Reusable workflow — deploys a Helm chart to AKS for a given environment.
# Used by the per-service workflow's deploy-dev / deploy-staging / deploy-prod
# jobs. Authenticates to Azure via OIDC federated identity — no secrets stored.
# ---------------------------------------------------------------------------
name: reusable-helm-deploy

on:
  workflow_call:
    inputs:
      serviceName:
        required: true
        type: string
      chartPath:
        required: true
        type: string
      valuesFile:
        required: true
        type: string
      imageTag:
        required: true
        type: string
      resourceGroup:
        required: true
        type: string
      aksClusterName:
        required: true
        type: string
      namespace:
        required: false
        default: 'freshcart'
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: true
      AZURE_TENANT_ID:
        required: true
      AZURE_SUBSCRIPTION_ID:
        required: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    name: Helm upgrade · ${{ inputs.serviceName }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get AKS credentials
        uses: azure/aks-set-context@v4
        with:
          resource-group: ${{ inputs.resourceGroup }}
          cluster-name: ${{ inputs.aksClusterName }}

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: 'v3.16.0'

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ inputs.serviceName }} ${{ inputs.chartPath }} \
            --namespace ${{ inputs.namespace }} \
            --create-namespace \
            --values ${{ inputs.valuesFile }} \
            --set image.tag=${{ inputs.imageTag }} \
            --atomic \
            --timeout 5m \
            --wait

      - name: Wait for rollout
        run: kubectl -n ${{ inputs.namespace }} rollout status deployment/${{ inputs.serviceName }} --timeout=3m

      # /alive is the only health endpoint mapped in every environment; /health is Development/Staging-only.
      - name: Smoke probe /alive
        run: |
          kubectl -n ${{ inputs.namespace }} run smoke-${{ inputs.serviceName }}-${{ github.run_id }} \
            --rm -i --restart=Never \
            --image=curlimages/curl:latest -- \
            curl --fail --max-time 10 http://${{ inputs.serviceName }}/alive
