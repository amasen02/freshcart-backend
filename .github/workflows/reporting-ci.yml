# ---------------------------------------------------------------------------
# CI for the reporting service: restore, build (Release) and test on master.
# Build + test only — no deploy. Deployment lives in deploy/helm + infra/.
# ---------------------------------------------------------------------------
name: reporting-ci

on:
  push:
    branches: [master]
    paths:
      - 'src/Services/Reporting/**'
      - 'src/BuildingBlocks/**'
      - '.github/workflows/reporting-ci.yml'
      - '.github/workflows/reusable-build-test.yml'
      - 'Directory.Build.props'
      - 'Directory.Packages.props'
      - 'global.json'
  pull_request:
    branches: [master]
    paths:
      - 'src/Services/Reporting/**'
      - 'src/BuildingBlocks/**'
  workflow_dispatch:

concurrency:
  group: reporting-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build · Test
    uses: ./.github/workflows/reusable-build-test.yml
    with:
      serviceName: reporting
      testProjectPath: src/Services/Reporting/FreshCart.Reporting.Tests/FreshCart.Reporting.Tests.csproj
