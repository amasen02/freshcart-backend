# ---------------------------------------------------------------------------
# Reusable workflow — builds a Docker image, scans with Trivy, signs with
# Cosign (keyless via GitHub OIDC) and pushes to both GHCR and Azure
# Container Registry. The image is tagged with the commit SHA, the run id,
# and `latest` on main.
# ---------------------------------------------------------------------------
name: reusable-container

on:
  workflow_call:
    inputs:
      serviceName:
        required: true
        type: string
      dockerfilePath:
        required: true
        type: string
      buildContext:
        required: false
        default: '.'
        type: string
      imageRepository:
        description: 'Repository within the registry (e.g. freshcart/identity).'
        required: true
        type: string
      acrName:
        description: 'Azure Container Registry short name (without .azurecr.io).'
        required: false
        default: ''
        type: string
      failOnSeverity:
        required: false
        default: 'HIGH,CRITICAL'
        type: string
    secrets:
      AZURE_CLIENT_ID:
        required: false
      AZURE_TENANT_ID:
        required: false
      AZURE_SUBSCRIPTION_ID:
        required: false

permissions:
  contents: read
  packages: write
  id-token: write          # required for Cosign keyless + Azure OIDC

jobs:
  container:
    name: Container · Scan · Sign · Push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Generate image tags
        id: tags
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "shortSha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to ACR via Azure OIDC
        if: ${{ inputs.acrName != '' && secrets.AZURE_CLIENT_ID != '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR Docker login
        if: ${{ inputs.acrName != '' }}
        run: az acr login --name ${{ inputs.acrName }}

      - name: Build image (single arch, load locally for scan)
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.buildContext }}
          file: ${{ inputs.dockerfilePath }}
          load: true
          tags: |
            ghcr.io/${{ inputs.imageRepository }}:${{ steps.tags.outputs.shortSha }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ github.event.repository.updated_at }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/${{ inputs.imageRepository }}:${{ steps.tags.outputs.shortSha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: ${{ inputs.failOnSeverity }}
          exit-code: '1'
          ignore-unfixed: true
          vuln-type: 'os,library'

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-${{ inputs.serviceName }}'

      - name: Push to GHCR
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.buildContext }}
          file: ${{ inputs.dockerfilePath }}
          push: true
          tags: |
            ghcr.io/${{ inputs.imageRepository }}:${{ steps.tags.outputs.shortSha }}
            ghcr.io/${{ inputs.imageRepository }}:run-${{ github.run_number }}
            ${{ github.ref == 'refs/heads/main' && format('ghcr.io/{0}:latest', inputs.imageRepository) || '' }}

      - name: Push to ACR
        if: ${{ inputs.acrName != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.buildContext }}
          file: ${{ inputs.dockerfilePath }}
          push: true
          tags: |
            ${{ inputs.acrName }}.azurecr.io/${{ inputs.imageRepository }}:${{ steps.tags.outputs.shortSha }}
            ${{ inputs.acrName }}.azurecr.io/${{ inputs.imageRepository }}:run-${{ github.run_number }}
            ${{ github.ref == 'refs/heads/main' && format('{0}.azurecr.io/{1}:latest', inputs.acrName, inputs.imageRepository) || '' }}

      - name: Install Cosign
        if: ${{ github.ref == 'refs/heads/main' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless via OIDC)
        if: ${{ github.ref == 'refs/heads/main' }}
        env:
          COSIGN_EXPERIMENTAL: 'true'
        run: |
          cosign sign --yes ghcr.io/${{ inputs.imageRepository }}:${{ steps.tags.outputs.shortSha }}
          if [ "${{ inputs.acrName }}" != "" ]; then
            cosign sign --yes ${{ inputs.acrName }}.azurecr.io/${{ inputs.imageRepository }}:${{ steps.tags.outputs.shortSha }}
          fi
