worker_processes auto;
pid /run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile      on;
  tcp_nopush    on;
  tcp_nodelay   on;
  server_tokens off;

  gzip              on;
  gzip_vary         on;
  gzip_min_length   1024;
  gzip_comp_level   6;
  gzip_types        text/plain text/css application/javascript application/json image/svg+xml font/woff2;

  log_format json escape=json '{"time":"$time_iso8601","remote_addr":"$remote_addr",'
    '"method":"$request_method","uri":"$uri","status":$status,'
    '"bytes_sent":$body_bytes_sent,"referer":"$http_referer","agent":"$http_user_agent"}';
  access_log /var/log/nginx/access.log json;
  error_log  /var/log/nginx/error.log warn;

  server {
    listen      80;
    server_name _;
    root        /usr/share/nginx/html;
    index       index.html;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "accelerometer=(), camera=(), geolocation=(), microphone=(), payment=()" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Fingerprinted build assets are immutable; cache them aggressively.
    location ~* \.(?:js|css|woff2|png|jpg|jpeg|gif|svg|ico)$ {
      expires    1y;
      add_header Cache-Control "public, immutable";
      try_files  $uri =404;
    }

    # index.html must never be cached so a deploy is picked up immediately.
    location = /index.html {
      add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    location / {
      try_files $uri $uri/ /index.html;
    }
  }
}
