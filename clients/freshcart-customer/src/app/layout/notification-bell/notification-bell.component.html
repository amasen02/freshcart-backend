<div ngbDropdown placement="bottom-end" class="d-inline-block">
  <button
    type="button"
    class="btn btn-link nav-link position-relative px-2"
    ngbDropdownToggle
    [attr.aria-label]="unreadCount() > 0 ? unreadCount() + ' unread notifications' : 'Notifications'">
    <i class="bi bi-bell fs-5" aria-hidden="true"></i>
    @if (isReconnecting()) {
      <i
        class="bi bi-wifi-off position-absolute bottom-0 start-0 text-warning small"
        title="Reconnecting to live updates"
        aria-hidden="true"></i>
    }
    @if (unreadCount() > 0) {
      <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill text-bg-danger">
        {{ unreadCount() }}
        <span class="visually-hidden">unread notifications</span>
      </span>
    }
  </button>

  <div ngbDropdownMenu class="shadow-sm p-0 fc-notification-menu">
    <div class="d-flex align-items-center justify-content-between px-3 py-2 border-bottom">
      <span class="fw-semibold">Notifications</span>
      @if (isReconnecting()) {
        <span class="small text-warning">
          <i class="bi bi-wifi-off me-1" aria-hidden="true"></i>Reconnecting
        </span>
      }
    </div>

    @for (notification of latestNotifications(); track notification.id) {
      <button
        type="button"
        ngbDropdownItem
        class="d-flex gap-2 align-items-start text-wrap py-2"
        (click)="openNotification(notification)">
        <span
          class="rounded-circle flex-shrink-0 mt-1 fc-unread-dot"
          [class.bg-primary]="!notification.isRead"
          [class.bg-transparent]="notification.isRead"
          aria-hidden="true"></span>
        <span class="flex-grow-1">
          <span class="d-block fw-semibold" [class.fw-normal]="notification.isRead">{{ notification.title }}</span>
          <span class="d-block small text-body-secondary">{{ notification.message }}</span>
          <span class="d-block small text-body-tertiary">{{ notification.createdOnUtc | fcRelativeTime }}</span>
        </span>
      </button>
    } @empty {
      <p class="text-body-secondary small text-center mb-0 px-3 py-4">You have no notifications yet.</p>
    }
  </div>
</div>
